<div class="home-container">
  <mat-card>
    <mat-card-title>Informe sua Conta</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Número da Conta</mat-label>
          <input matInput type="text" maxlength="10" formControlName="numeroConta" placeholder="Informa número da conta">
        </mat-form-field>

        <div>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid" (onSubmit)="onSubmit()">
            Entrar
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
