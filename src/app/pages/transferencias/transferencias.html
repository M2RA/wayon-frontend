<div class="container-principal">
  <mat-card>
    <mat-card-header>
      <mat-card-title class="titulo">{{ titulo }}</mat-card-title>
    </mat-card-header>
    <div class="bt-nova">
      <button mat-raised-button color="primary" (click)="criarNovaTransferencia()">
        Nova Transferência
      </button>
    </div>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" >

        <!-- Position Column -->
        <ng-container matColumnDef="tipoOperacao">
          <th mat-header-cell *matHeaderCellDef> Tipo Operacao </th>
          <td mat-cell *matCellDef="let element"> {{element.tipoOperacao}} </td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="valorOperacao">
          <th mat-header-cell *matHeaderCellDef> Valor </th>
          <td mat-cell *matCellDef="let element"> {{element.valorOperacao}} </td>
        </ng-container>

        <!-- Weight Column -->
        <ng-container matColumnDef="saldoInstantaneo">
          <th mat-header-cell *matHeaderCellDef> Saldo </th>
          <td mat-cell *matCellDef="let element"> {{element.saldoInstantaneo}} </td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="dataAgendamento">
          <th mat-header-cell *matHeaderCellDef> Agendada em </th>
          <td mat-cell *matCellDef="let element"> {{element.dataAgendamento}} </td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="dataExecucao">
          <th mat-header-cell *matHeaderCellDef> Execução </th>
          <td mat-cell *matCellDef="let element"> {{element.dataExecucao}} </td>
        </ng-container>

        <!-- Symbol Column -->
        <ng-container matColumnDef="observacao">
          <th mat-header-cell *matHeaderCellDef> Obs </th>
          <td mat-cell *matCellDef="let element"> {{element.observacao}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
        [ngClass]="{'deposito':row.tipoOperacao === 'DEPOSITO','saque': row.tipoOperacao === 'SAQUE'}"
        ></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
